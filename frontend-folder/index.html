<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scalar - Expenses</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-8 font-sans">

    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-gray-900">Recent Expenses</h1>
        
        <div id="receipt-list" class="space-y-4">
            <p class="text-gray-500 animate-pulse">Loading your transactions...</p>
        </div>
    </div>

    <script>
        // This function fetches data from your Go backend
        async function loadTransactions() {
            const container = document.getElementById('receipt-list');
            
            try {
                // Hitting the Gin endpoint you set up in main.go
                const response = await fetch('/api/transactions');
                const transactions = await response.json();
                
                // Clear the "Loading" text
                container.innerHTML = '';

                if (!transactions || transactions.length === 0) {
                    container.innerHTML = '<p class="text-gray-500">No expenses found yet. Waiting for new emails...</p>';
                    return;
                }

                // Loop through your database results and build the UI
                transactions.forEach(t => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-lg shadow-sm border border-gray-200 flex justify-between items-center";
                    
                    // Adjust these variable names (t.vendor, t.total) if your Go struct uses different JSON tags!
                    card.innerHTML = `
                        <div>
                            <h2 class="text-xl font-semibold text-gray-800">${t.vendor || 'Unknown Vendor'}</h2>
                            <div class="flex gap-2 text-sm text-gray-500 mt-1">
                                <span>${t.date || 'No Date'}</span>
                                <span>&bull;</span>
                                <span class="bg-gray-100 px-2 rounded">${t.category || 'Uncategorized'}</span>
                            </div>
                        </div>
                        <div class="text-2xl font-bold text-gray-900">
                            Rp ${t.total || '0'}
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error("Failed to load:", error);
                container.innerHTML = '<p class="text-red-500">Failed to connect to the server.</p>';
            }
        }

        // Run the function as soon as the page loads
        loadTransactions();
    </script>
</body>
</html>
